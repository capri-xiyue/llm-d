endpoint:
  stack_name: &stack_name inf-scheduling-Qwen3-VL-32B-Instruct  # user defined name for the stack (results prefix)
  model: &model Qwen/Qwen3-VL-32B-Instruct        # Exact HuggingFace model name. Must match stack deployed.
  namespace: &namespace ${NAMESPACE}  # Namespace where stack is deployed
  base_url: &url http://${IP}  # Base URL of inference endpoint
  hf_token_secret: llm-d-hf-token     # The name of secret that contains the HF token of the stack

control:
  work_dir: $HOME/llm-d-bench-work  # working directory to store temporary and autogenerated files.
                                    # Do not edit content manually.
                                    # If not set, a temp directory will be created.
  kubectl: kubectl                  # kubectl command: kubectl or oc

harness:
  name: &harness_name inference-perf
  results_pvc: ${BENCHMARK_PVC}   # PVC where benchmark results are stored
  namespace: *namespace           # Namespace where harness is deployed. Typically with stack.
  parallelism: 1                  # Number of parallel workload launcher pods to create.
  wait_timeout: 6000              # Time (in seconds) to wait for workload launcher pod to complete before terminating.
                                  # Set to 0 to disable timeout.
  image: ghcr.io/llm-d/llm-d-benchmark:v0.6.7
  # dataset_url: &dataset_url none

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:                         # yaml configuration for harness workload(s)
  # Workload A: High System Prompt to User Prompt ratio, No System Cache Pressure",
  Shared_prefix:
    load:
      type: poisson
      interval: 30.0
      stages:
        # Warmup — seat residents (~1×S)
        - rate: 1
          duration: 10
        # Main ladder
        - rate: 10
          duration: 60
        - rate: 20
          duration: 60
        - rate: 30
          duration: 60
        - rate: 40
          duration: 60
        - rate: 50
          duration: 60
        - rate: 60
          duration: 60
        - rate: 70
          duration: 60
        - rate: 80
          duration: 60
    api:
      type: chat
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: *model
    data:
      type: shared_prefix
      shared_prefix:
        multimodal:
          image:
          count: { type: fixed, min: 3, max: 3, mean: 3 }  # items per request
          insertion_point: 0.0
          resolutions:
            - resolution: "720p"
              weight: 1
        num_groups: 5400
        num_prompts_per_group: 4
        system_prompt_len: 100
        question_len: 200
        output_len: 100
        enable_multi_turn_chat: false
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
